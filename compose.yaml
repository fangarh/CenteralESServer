services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CENTERALES_POSTGRES_DB:-centerales}
      POSTGRES_USER: ${CENTERALES_POSTGRES_USER:-centerales}
      POSTGRES_PASSWORD: ${CENTERALES_POSTGRES_PASSWORD:?Set CENTERALES_POSTGRES_PASSWORD in .env}
    volumes:
      - centerales-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrator
    environment:
      DOTNET_ENVIRONMENT: Production
      CENTERALES_PROCESSING_DATABASE: "Host=postgres;Port=5432;Database=${CENTERALES_POSTGRES_DB:-centerales};Username=${CENTERALES_POSTGRES_USER:-centerales};Password=${CENTERALES_POSTGRES_PASSWORD:?Set CENTERALES_POSTGRES_PASSWORD in .env}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CENTERALES_PROCESSING_DATABASE: "Host=postgres;Port=5432;Database=${CENTERALES_POSTGRES_DB:-centerales};Username=${CENTERALES_POSTGRES_USER:-centerales};Password=${CENTERALES_POSTGRES_PASSWORD:?Set CENTERALES_POSTGRES_PASSWORD in .env}"
      Database__AutoBootstrap: "false"
      Storage__TemporaryRoot: /var/lib/centerales/temporary-files
      AllowedHosts: ${CENTERALES_ALLOWED_HOSTS:-localhost;127.0.0.1}
    ports:
      - "${CENTERALES_WEB_PORT:-8080}:8080"
    volumes:
      - centerales-temporary-storage:/var/lib/centerales/temporary-files
    depends_on:
      migrator:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DOTNET_ENVIRONMENT: Production
      CENTERALES_PROCESSING_DATABASE: "Host=postgres;Port=5432;Database=${CENTERALES_POSTGRES_DB:-centerales};Username=${CENTERALES_POSTGRES_USER:-centerales};Password=${CENTERALES_POSTGRES_PASSWORD:?Set CENTERALES_POSTGRES_PASSWORD in .env}"
      Database__AutoBootstrap: "false"
      Storage__TemporaryRoot: /var/lib/centerales/temporary-files
      PdfStampRecognition__Recognizer: ${CENTERALES_PDF_RECOGNIZER:-Fake}
      PdfStampRecognition__Processor__endpointPool__0: ${CENTERALES_PDF2TXT_ENDPOINT:-}
    volumes:
      - centerales-temporary-storage:/var/lib/centerales/temporary-files
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  centerales-postgres-data:
  centerales-temporary-storage:
